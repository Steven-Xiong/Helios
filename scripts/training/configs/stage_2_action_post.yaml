output_dir: /mnt/bn/voyager-sg-l3/zhexiao.xiong/Helios/ckpts/helios/stage2_action_post
logging_dir: /mnt/bn/voyager-sg-l3/zhexiao.xiong/Helios/output_helios/stage2_action_post/logs
seed: 46


report_to:
  tracker_name: Helios-Action-WorldModel
  wandb_name: action_world_model_stage2_post
  report_to: wandb


data_config:
  # ---- Base ----
  use_shuffle: true
  pin_memory: true
  persistent_workers: true
  force_rebuild: true
  single_res: true
  single_height: 384
  single_width: 640
  dataloader_num_workers: 16
  prefetch_factor: 2
  caption_dropout_p: 0
  id_token: ""
  instance_data_root:
    - "data/helios/seadance2_v2_helios_latents"
  # ---- Stage 1 ----
  use_stage1_dataset: true
  # ---- Action Conditioning ----
  action_embeds_cache_path: "data/helios/action_embeds_cache.pt"


model_config:
  # ---- Path ----
  pretrained_model_name_or_path: "BestWishYsh/Helios-Base"
  # NOTE: points to MERGED stage-2-init transformer
  transformer_model_name_or_path: "PLACEHOLDER_MERGED_S2_INIT"
  load_checkpoints_custom: false
  load_dcp: false
  # ---- Vae ----
  upcast_vae: true
  enable_slicing: false
  enable_tiling: false
  # ---- Lora ----
  lora_rank: 256
  lora_alpha: 256.0
  lora_dropout: 0.0
  lora_layers: "all-linear"
  lora_exclude_modules:
    - down
    - up
  # ---- Other ----
  train_norm_layers: false


validation_config:
  validation_steps: 200
  validation_height: 384
  validation_width: 640
  validation_max_num_frames: 97
  validation_prompts:
    - "This video depicts a first-person view (FPV) egocentric scene. Person moves forward (W). Camera turns right (→)."
  validation_guidance_scale: 5.0
  validation_latent_window_size:
    - 9
  num_validation_videos: 1
  # ---- Stage 2 Pyramid ----
  stage2_simulated_inference_steps:
    - 20
    - 20
    - 20


training_config:
  # ---- Environment ----
  allow_tf32: false
  gradient_checkpointing: true
  enable_xformers_memory_efficient_attention: false
  enable_npu_flash_attention: false
  upcast_before_saving: false
  offload: false
  mixed_precision: "bf16"
  # ---- Training Resource ----
  max_train_steps: 2000
  train_batch_size: 1
  gradient_accumulation_steps: 2
  checkpointing_steps: 500
  resume_from_checkpoint: "latest"
  save_checkpoints_custom: false
  # ---- Optimizer ----
  # NOTE: post phase LR=3e-5, lower than init's 1e-4 (matching paper stage-2-post)
  learning_rate: 3e-5
  lr_scheduler: "constant_with_warmup"
  lr_warmup_steps: 200
  optimizer: "adamw"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1e-04
  adam_epsilon: 1e-08
  max_grad_norm: 1.0
  weighting_scheme: "none"
  logit_mean: 0.0
  logit_std: 1.0
  mode_scale: 1.29
  # ---- Dynamic Shifting Parameters ----
  use_dynamic_shifting: false
  base_seq_len: 256
  max_seq_len: 4096
  base_shift: 0.5
  max_shift: 1.15
  # ---- VAE Decode Parameters ----
  vae_decode_type: "default"
  # ---- EMA Parameters ----
  use_ema: false
  # ---- Stage 1 Parameters ----
  is_enable_stage1: true
  history_sizes:
    - 16
    - 2
    - 1
  latent_window_size:
    - 9
  is_random_drop: true
  random_drop_i2v_ratio: 0.4
  random_drop_v2v_ratio: 0.4
  random_drop_t2v_ratio: 0.0
  corrupt_model_input: false
  corrupt_mode_model_input: "noise"
  corrupt_mode_prob_model_input: 0.9
  is_frame_independent_corrupt_model_input: true
  is_chunk_independent_corrupt_model_input: false
  noise_corrupt_ratio_model_input: 0.33333333333333
  noise_corrupt_clean_prob_model_input: 0.1
  downsample_min_corrupt_ratio_model_input: 0.9
  downsample_max_corrupt_ratio_model_input: 1.0
  corrupt_history: true
  corrupt_mode_history: "noise"
  corrupt_mode_prob_history: 0.9
  is_frame_independent_corrupt_history: true
  is_chunk_independent_corrupt_history: false
  noise_corrupt_ratio_history_short: 0.33333333333333
  noise_corrupt_ratio_history_mid: 0.33333333333333
  noise_corrupt_ratio_history_long: 0.33333333333333
  noise_corrupt_clean_prob_history: 0.1
  downsample_min_corrupt_ratio_history: 0.9
  downsample_max_corrupt_ratio_history: 1.0
  is_amplify_history: false
  history_scale_mode: "per_head"
  # NOTE: post adds LoRA to patch_embedding and multi_term_memory patches (matching paper stage-2-post)
  is_train_full_patch_embedding: false
  is_train_lora_patch_embedding: true
  has_multi_term_memory_patch: true
  is_train_full_multi_term_memory_patchg: false
  is_train_lora_multi_term_memory_patchg: true
  zero_history_timestep: true
  guidance_cross_attn: true
  restrict_self_attn: false
  is_train_restrict_lora: false
  restrict_lora: false
  restrict_lora_rank: 128
  # ---- Stage 2 Parameters ----
  is_enable_stage2: true
  is_navit_pyramid: true
  stage2_num_stages: 3
  stage2_timestep_shift: 1.0
  stage2_scheduler_gamma: 0.333333333333333333333333333333333
  stage2_stage_range:
    - 0
    - 0.333333333333333333333333333333333
    - 0.666666666666666666666666666666666
    - 1
  # NOTE: post uses [1,1,1] instead of init's [1,2,1] (matching paper stage-2-post)
  stage2_sample_ratios:
    - 1
    - 1
    - 1
  efficient_sample: false
