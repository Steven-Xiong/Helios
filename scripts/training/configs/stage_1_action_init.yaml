output_dir: /mnt/bn/voyager-sg-l3/zhexiao.xiong/Helios/ckpts/helios/stage1_action
logging_dir: /mnt/bn/voyager-sg-l3/zhexiao.xiong/Helios/output_helios/stage1_action/logs
seed: 43


report_to:
  tracker_name: Helios-Action-WorldModel
  wandb_name: action_world_model_stage1
  report_to: wandb


data_config:
  # ---- Base ----
  use_shuffle: true
  pin_memory: true
  persistent_workers: true
  force_rebuild: true
  single_res: true
  single_height: 384
  single_width: 640
  dataloader_num_workers: 16
  prefetch_factor: 2
  caption_dropout_p: 0.1
  id_token: ""
  instance_data_root:
    - "data/helios/seadance2_v2_helios_latents"
  # ---- Stage 1 ----
  use_stage1_dataset: true
  # ---- Action Conditioning ----
  action_embeds_cache_path: "data/helios/action_embeds_cache.pt"


model_config:
  # ---- Path ----
  pretrained_model_name_or_path: "/mnt/bn/voyager-sg-l3/zhexiao.xiong/Helios/BestWishYSH/Helios-Base"
  transformer_model_name_or_path: "/mnt/bn/voyager-sg-l3/zhexiao.xiong/Helios/BestWishYSH/Helios-Base"
  load_checkpoints_custom: false
  load_dcp: false
  # ---- Vae ----
  upcast_vae: true
  enable_slicing: false
  enable_tiling: false
  # ---- Lora ----
  lora_rank: 128
  lora_alpha: 128.0
  lora_dropout: 0.0
  lora_layers: "all-linear"
  lora_exclude_modules:
    - down
    - up
  # ---- Other ----
  train_norm_layers: true


validation_config:
  validation_steps: 200
  validation_height: 384
  validation_width: 640
  validation_max_num_frames: 161
  validation_prompts:
    - "This video depicts a first-person view (FPV) egocentric scene. Person moves forward (W). Camera turns right (→)."
    - "This video depicts a first-person view (FPV) egocentric scene. Person moves forward and left (W+A). Camera remains still (·)."
  validation_guidance_scale: 5.0
  validation_latent_window_size:
    - 9
  num_validation_videos: 1
  num_inference_steps: 50


training_config:
  # ---- Environment ----
  allow_tf32: false
  gradient_checkpointing: true
  enable_xformers_memory_efficient_attention: false
  enable_npu_flash_attention: false
  upcast_before_saving: false
  offload: false
  mixed_precision: "bf16"
  # ---- Training Resource ----
  max_train_steps: 4000
  train_batch_size: 2
  gradient_accumulation_steps: 2
  checkpointing_steps: 500
  resume_from_checkpoint: "latest"
  save_checkpoints_custom: false
  # ---- Optimizer ----
  learning_rate: 5e-5
  lr_scheduler: "constant"
  lr_warmup_steps: 200
  optimizer: "adamw"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1e-04
  adam_epsilon: 1e-08
  max_grad_norm: 1.0
  weighting_scheme: "logit_normal"
  logit_mean: 0.0
  logit_std: 1.0
  mode_scale: 1.29
  # ---- Dynamic Shifting Parameters ----
  use_dynamic_shifting: false
  base_seq_len: 256
  max_seq_len: 4096
  base_shift: 0.5
  max_shift: 1.15
  # ---- VAE Decode Parameters ----
  vae_decode_type: "default"
  # ---- EMA Parameters ----
  use_ema: false
  # ---- Stage 1 Parameters ----
  is_enable_stage1: true
  history_sizes:
    - 16
    - 2
    - 1
  latent_window_size:
    - 9
  is_random_drop: true
  random_drop_i2v_ratio: 0.4
  random_drop_v2v_ratio: 0.4
  random_drop_t2v_ratio: 0.0
  # Frame-aware corruption for anti-drifting
  corrupt_model_input: false
  corrupt_history: true
  corrupt_mode_history: "noise"
  corrupt_mode_prob_history: 0.9
  is_frame_independent_corrupt_history: true
  is_chunk_independent_corrupt_history: false
  noise_corrupt_ratio_history_short: 0.33333333333333
  noise_corrupt_ratio_history_mid: 0.33333333333333
  noise_corrupt_ratio_history_long: 0.33333333333333
  noise_corrupt_clean_prob_history: 0.1
  downsample_min_corrupt_ratio_history: 0.9
  downsample_max_corrupt_ratio_history: 1.0
  # Multi-term memory
  is_amplify_history: false
  history_scale_mode: "per_head"
  is_train_full_patch_embedding: false
  is_train_lora_patch_embedding: true
  has_multi_term_memory_patch: true
  is_train_full_multi_term_memory_patchg: true
  is_train_lora_multi_term_memory_patchg: false
  zero_history_timestep: true
  guidance_cross_attn: true
  restrict_self_attn: false
  is_train_restrict_lora: false
  restrict_lora: false
  restrict_lora_rank: 128
